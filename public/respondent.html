<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f47b20" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Responden - SENSUS EKONOMI 2026</title>
  <link rel="stylesheet" href="/styles.css?v=11" />
  <link rel="stylesheet" href="/data.css?v=11" />
</head>
<body class="gate-only">
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu">☰</button>
      <span class="brand-mark">F</span>
      <span class="crumb-chip" id="surveyChip">PENDATAAN</span>
    </div>
    <div class="topbar-right">
      <button id="clearRespondentSessionBtn" class="btn-ghost" hidden>Keluar</button>
    </div>
  </header>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <main class="main">
    <section class="respondent-shell">
      <div id="respondentGate" class="respondent-gate">
        <div class="respondent-meta">
          <span class="respondent-chip" id="gateTypeChip">Memuat...</span>
        </div>
        <h2 id="gateTitle">Memuat akses responden...</h2>
        <p id="gateSubtitle">Mohon tunggu sebentar.</p>
        <form id="gateForm" class="respondent-grid"></form>
        <div class="respondent-actions">
          <button id="gateSubmitBtn" type="button" class="lf-btn">Lanjut</button>
        </div>
        <div id="gateError" class="lf-error" hidden></div>
      </div>
    </section>

    <div id="readonlyBanner" class="readonly-banner" hidden></div>
    <div class="main-head" id="respondentHead" hidden>
      <h1 id="surveyTitle">SENSUS EKONOMI 2026</h1>
      <div class="head-actions">
        <button id="saveBtn" class="btn-summary">Simpan Draft</button>
        <button id="submitBtn" class="btn-summary">Submit Final</button>
        <button id="summaryBtn" class="btn-summary">Ringkasan</button>
      </div>
    </div>
    <div id="saveStatus" class="save-status" hidden></div>

    <div class="layout" id="respondentLayout" hidden>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-title" id="sidebarTitle">SENSUS EKONOMI 2026</div>
        <nav id="blockNav" class="block-nav"></nav>
      </aside>

      <main class="main">
        <div class="form-shell">
          <section id="formCard" class="form-card">
            <div class="loading">Memuat formulir...</div>
          </section>
        </div>
      </main>
    </div>
  </main>

  <footer class="bottombar" id="respondentBottom" hidden>
    <button id="prevBtn" class="nav-btn nav-prev" hidden>
      <span class="nav-arrow">←</span>
      <span class="nav-text"><small>SEBELUMNYA</small><strong id="prevLabel"></strong></span>
    </button>
    <div class="nav-center" id="centerLabel">PENGANTAR</div>
    <button id="nextBtn" class="nav-btn nav-next">
      <span class="nav-text right"><small>BERIKUTNYA</small><strong id="nextLabel"></strong></span>
      <span class="nav-arrow">→</span>
    </button>
  </footer>

  <div id="summaryModal" class="modal-backdrop" hidden>
    <div class="modal">
      <div class="modal-head">
        <div>
          <h2>Ringkasan</h2>
          <p id="summaryCount" class="modal-sub">0 Jawaban</p>
        </div>
        <button id="modalClose" class="modal-close">✕</button>
      </div>
      <div class="summary-grid">
        <div class="summary-tile tile-error">
          <span class="tile-icon">⛔</span>
          <div><div class="tile-label">GALAT</div><div class="tile-num" id="sumError">0</div><div class="tile-note">Perlu diperbaiki</div></div>
        </div>
        <div class="summary-tile tile-warn">
          <span class="tile-icon">⚠️</span>
          <div><div class="tile-label">PERINGATAN</div><div class="tile-num" id="sumWarn">0</div><div class="tile-note">Perlu ditinjau</div></div>
        </div>
        <div class="summary-tile tile-note">
          <span class="tile-icon">💬</span>
          <div><div class="tile-label">CATATAN</div><div class="tile-num" id="sumNote">0</div><div class="tile-note">Catatan aktif</div></div>
        </div>
        <div class="summary-tile tile-empty">
          <span class="tile-icon">📄</span>
          <div><div class="tile-label">KOSONG</div><div class="tile-num" id="sumEmpty">0</div><div class="tile-note">Belum diisi</div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/pdf-rules.js?v=11"></script>
  <script src="/engine.js?v=11"></script>
  <script src="/respondent.js?v=11"></script>
</body>
</html>
